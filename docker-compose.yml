services:
  vpm-repo:
    build: .
    ports:
      - "${VPM_PORT:-8080}:8080"
    environment:
      PUBLIC_BASE: ${PUBLIC_BASE:-http://127.0.0.1:8080}
      DATA_DIR: /data
      PROJECTS_DIR: /data/projects
      WATCH_DEBOUNCE_SEC: ${WATCH_DEBOUNCE_SEC:-4}
      AUTO_BUMP_PATCH: ${AUTO_BUMP_PATCH:-true}
      WATCH_IGNORE_META: ${WATCH_IGNORE_META:-true}
    volumes:
      - ./data:/data
      - ./projects:/data/projects
    restart: unless-stopped
